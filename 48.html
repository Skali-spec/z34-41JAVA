<!DOCTYPE html>
	<head>
		<title>Sprawdzenie danych Alan Milcewicz </title>
		<meta charset="utf-8">
	</head>
	<body>
		<div style="color:red;font-size:50px;">
		<script language="JavaScript">
		  do {
		  var liczba1_mil=prompt("wysokość=","");
		  var h_mil=parseFloat(liczba1_mil);
		     }
		    while ( h_mil<=0);
		    do {
		  var liczba1_mil=prompt("podstawę=","");
		  var a_mil=parseFloat(liczba1_mil);
		       }
		  while(!( a_mil>0));
		  var Pole_mil=a_mil*h_mil/2;
		  document.write("Pole="+Pole_mil.toFixed(2)+" cm^2"+"<br>");
		</script>
		</div>
	</body>
</html>
