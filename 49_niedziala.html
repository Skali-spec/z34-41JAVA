<!DOCTYPE html>
	<head>
		<title>Sprawdzenie danych Alan Milcewicz </title>
		<meta charset="utf-8">
	</head>
	<body>
		<div style="color:red;font-size:50px;">
		<script language="JavaScript">
		 do {
		    
                    var a=parseFloat(prompt("bok a=",""));
                    var b=parseFloat(prompt("bok b=",""));
                    var c=parseFloat(prompt("bok c=",""));
               document.write("sprawdzam warunki dla trójkąta dla wczytanych danych+"<br>");
                    }
                 while
               (!((a>0)&&(b>0)&&(c>0)&&(a+b>c)&&(a+c>b)&&(c+b>a)));
                 document.write("wyrok: trójkąt się zamyka oraz boki są dodane");
		</script>
		</div>
	</body>
</html>
